name: Generate help screenshots

on:
  workflow_dispatch:
    inputs:
      lang:
        description: 'Comma-separated locales to generate (leave empty for all 10)'
        required: false
        default: ''
      slug:
        description: 'Comma-separated use-case slugs to generate (leave empty for all)'
        required: false
        default: ''

jobs:
  screenshots:
    name: Capture and commit screenshots
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need full history so the commit step can push.
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build app
        run: npm run build

      - name: Start preview server (background)
        run: |
          npm run preview &
          # Wait until the preview server is ready.
          npx wait-on http://localhost:4173 --timeout 60000

      - name: Generate screenshots
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:4173
          SETTLE_MS: 6000
          HELP_SCREENSHOT_EMAIL: ${{ secrets.HELP_SCREENSHOT_EMAIL }}
          HELP_SCREENSHOT_PASSWORD: ${{ secrets.HELP_SCREENSHOT_PASSWORD }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.lang }}" ]; then
            ARGS="$ARGS --lang ${{ github.event.inputs.lang }}"
          fi
          if [ -n "${{ github.event.inputs.slug }}" ]; then
            ARGS="$ARGS --slug ${{ github.event.inputs.slug }}"
          fi
          node scripts/generate-help-screenshots.mjs $ARGS

      - name: Commit screenshots
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/help-screenshots/
          if git diff --cached --quiet; then
            echo "No screenshot changes to commit."
          else
            git commit -m "chore: regenerate help screenshots [skip ci]"
            git push
          fi
